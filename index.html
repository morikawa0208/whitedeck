                <div class="flex justify-between items-center mb-2">
                    <h4 class="font-bold text-xs text-gray-500">基礎能力値振り分け</h4>
                    <i class="fa-solid fa-circle-info text-gray-400 hover:text-blue-500 cursor-pointer" onclick="Game.showInfoModal('ステータス詳細', 'STR: 物理攻撃力(ATK)に影響します。<br>VIT: 物理防御力(DEF)と最大HP(+2)に影響します。<br>DEX: 盗賊の見切り回避率や一部スキルに影響します。<br>INT: 魔法ダメージと最大CP(+1)に影響します。<br>LUK: アイテムドロップ時のレア度が高くなりやすくなります。')"></i>
                </div>
                <div class="grid grid-cols-2 gap-x-2 gap-y-1">
                    ${renderStatRow('STR', 'str', 'text-red-500')}
                    ${renderStatRow('VIT', 'vit', 'text-blue-500')}
                    ${renderStatRow('DEX', 'dex', 'text-green-500')}
                    ${renderStatRow('INT', 'int', 'text-purple-500')}
                    ${renderStatRow('LUK', 'luk', 'text-yellow-600')}
                </div>
                <div class="text-[10px] text-gray-400 mt-2 text-right">※カッコ内は装備+パッシブ補正</div>
            </div>

            <div class="bg-gray-50 border p-3 rounded shadow-sm space-y-1 text-sm">
                <div class="flex justify-between font-bold"><span>総物理攻撃力(ATK):</span> <span class="text-red-600">${atkRange.min} - ${atkRange.max}</span></div>
                <div class="flex justify-between font-bold"><span>総物理防御力(DEF):</span> <span class="text-blue-600">${Utils.getDef()}</span></div>
            </div>
        `;
        Game.showModal(html);
    },

    addStat: (statKey) => {
        if (State.player.statPoints > 0) {
            State.player.statPoints--;
            State.player.addedStats[statKey]++;
            // VIT/INTに振った場合は最大HP/CPが増えるので現在値も少し回復させるか、最大値だけ上げる
            if (statKey === 'vit') State.player.hp += 2;
            if (statKey === 'int') State.player.cp += 1;
            Game.updateHeader();
            Game.showStatus();
            if(document.getElementById('player-info-block')) Game.renderPlayerInfo();
        }
    },

    resetStat: () => {
        Game.showConfirmModal({
            title: 'ステータスリセット確認',
            message: 'ステータスポイントをリセットしますか？',
            confirmText: 'リセットする',
            cancelText: 'やめる',
            onConfirm: () => {
                const p = State.player;
                let totalAdded = p.addedStats.str + p.addedStats.vit + p.addedStats.dex + p.addedStats.int + p.addedStats.luk;
                if (totalAdded > 0) {
                    p.statPoints += totalAdded;
                    p.addedStats = { str: 0, vit: 0, dex: 0, int: 0, luk: 0 };
                    p.hp = Math.min(p.hp, Utils.getMaxHp());
                    p.cp = Math.min(p.cp, Utils.getMaxCp());
                    Game.updateHeader();
                    Game.showStatus();
                    if(document.getElementById('player-info-block')) Game.renderPlayerInfo();
                }
            }
        });
    },

    showLogs: () => {
        let html = `
            <h3 class="font-bold text-lg mb-4 border-b pb-2"><i class="fa-solid fa-file-lines mr-2"></i>冒険の記録</h3>
            <div class="space-y-1 text-xs max-h-[60vh] overflow-y-auto p-2 bg-gray-50 border rounded hide-scrollbar" id="full-log-container">
                ${State.fullLogs.length > 0 ? State.fullLogs.map(l => `<div class="border-b border-gray-200 pb-1 mb-1">${l}</div>`).join('') : '<div class="text-gray-400 text-center py-4">まだ記録がありません</div>'}
            </div>
            <button onclick="Game.closeModal()" class="mt-4 px-4 py-2 bg-gray-800 text-white rounded font-bold w-full shadow">閉じる</button>
        `;
        Game.showModal(html);
        setTimeout(() => {
            const el = document.getElementById('full-log-container');
            if (el) el.scrollTop = el.scrollHeight;
        }, 10);
    },

    addSealedImprints: (category, amount = 1) => {
        Utils.ensureInventoryStructure();
        State.player.inventory.sealedImprints[category] = (State.player.inventory.sealedImprints[category] || 0) + amount;
        Game.showImprintLab();
    },

    rollImprintRank: (category) => {
        const rule = IMPRINT_CATEGORY[category];
        const candidates = [];
        for (let r = rule.rankMin; r <= rule.rankMax; r++) {
            candidates.push({ value: r, weight: IMPRINT_RANK_WEIGHTS[r] || 1 });
        }
        return Utils.weightedPick(candidates);
    },

    rollImprintBonus: (rank) => {
        const range = IMPRINT_BONUS_RANGES[rank];
        if (!range) return 0;
        const minStep = Math.round(range[0] * 10);
        const maxStep = Math.round(range[1] * 10);
        return Utils.rand(minStep, maxStep) / 10;
    },

    identifyImprints: (category, count = 1) => {
        Utils.ensureInventoryStructure();
        const stock = State.player.inventory.sealedImprints[category] || 0;
        const actual = Math.max(0, Math.min(stock, count));
        if (actual <= 0) return;
        for (let i = 0; i < actual; i++) {
            const rank = Game.rollImprintRank(category);
            const cost = Utils.getImprintCostByRank(rank);
            const effectKey = rank === 6 ? 'attackCountPlusOne' : IMPRINT_EFFECT_KEYS[Utils.rand(0, IMPRINT_EFFECT_KEYS.length - 1)];
            State.player.inventory.imprints.push({
                id: Utils.generateId('imprint'),
                category,
                rank,
                rankBonus: rank === 6 ? 0 : Game.rollImprintBonus(rank),
                cost,
                effectKey,
                uniqueKey: rank === 6 ? 'rank6_attack_count_plus_1' : `normal_${effectKey}`
            });
        }
        State.player.inventory.sealedImprints[category] -= actual;
        Game.showImprintLab();
    },

    equipImprint: (slotName, imprintId) => {
        Utils.ensureInventoryStructure();
        const item = State.player.equip[slotName];
        const imprint = State.player.inventory.imprints.find(im => im.id === imprintId);
        if (!item || !imprint) return;
        Utils.ensureItemImprintSlots(item);
        if (item.imprintSlots.equippedImprintIds.includes(imprintId)) return;
        const used = Utils.getImprintUsedCapacity(item);
        if (used + imprint.cost > item.imprintSlots.capacity) {
            Game.showAlertModal({ title: '装着できません', message: 'ソケット容量が不足しています。' });
            return;
        }
        item.imprintSlots.equippedImprintIds.push(imprintId);
        Game.showImprintLab();
    },

    removeImprint: (slotName, imprintId) => {
        const item = State.player.equip[slotName];
        if (!item || !item.imprintSlots) return;
        Game.showConfirmModal({
            title: '刻印解除の確認',
            message: 'この刻印を装備から解除しますか？',
            confirmText: '解除する',
            cancelText: 'やめる',
            onConfirm: () => {
                item.imprintSlots.equippedImprintIds = item.imprintSlots.equippedImprintIds.filter(id => id !== imprintId);
                Game.showInventory();
            }
        });
    },

    showImprintLab: (filterRank = 0) => {
        Utils.ensureInventoryStructure();
        const sealed = State.player.inventory.sealedImprints;
        const summary = Utils.getImprintEffectsSummary();
        const effectRows = Object.entries(summary.grouped).map(([k, v]) => `<div class="text-[11px] text-gray-700">${k}: EffectiveLv ${v.effectiveLv.toFixed(1)} / 最終 ${v.value}</div>`).join('');
        const renderStack = (key) => {
            const c = IMPRINT_CATEGORY[key];
            const qty = sealed[key] || 0;
            return `<div class="border rounded p-2 text-xs bg-gray-50">
                <div class="font-bold mb-1"><i class="fa-solid ${c.icon} mr-1"></i>${c.name} x${qty}</div>
                <div class="flex gap-1">
                    <button onclick="Game.identifyImprints('${key}',1)" class="px-2 py-1 bg-blue-500 text-white rounded text-[10px]" ${qty < 1 ? 'disabled' : ''}>個別鑑定</button>
                    <button onclick="Game.identifyImprints('${key}',${qty})" class="px-2 py-1 bg-indigo-500 text-white rounded text-[10px]" ${qty < 1 ? 'disabled' : ''}>一括鑑定</button>
                </div>
            </div>`;
        };

        const equippedIds = new Set(Utils.getEquippedImprints().map(im => im.id));
        const groupedMap = {};
        State.player.inventory.imprints.forEach(im => {
            const sig = `${im.category}|${im.rank}|${im.cost}|${im.effectKey}|${im.rankBonus}|${im.uniqueKey}`;
            if (!groupedMap[sig]) {
                groupedMap[sig] = { ...im, count: 0, freeCount: 0, signature: sig };
            }
            groupedMap[sig].count += 1;
            if (!equippedIds.has(im.id)) groupedMap[sig].freeCount += 1;
        });

        const groupedList = Object.values(groupedMap)
            .filter(g => (filterRank === 0 ? true : g.rank === filterRank))
            .sort((a, b) => (b.rank - a.rank) || a.effectKey.localeCompare(b.effectKey) || b.rankBonus - a.rankBonus);

        const rankFilterButtons = ['全て', '1', '2', '3', '4', '5', '6'].map(label => {
            const rank = label === '全て' ? 0 : Number(label);
            const active = rank === filterRank;
            return `<button onclick="Game.showImprintLab(${rank})" class="px-2 py-1 rounded text-[10px] border ${active ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-300'}">${label}</button>`;
        }).join('');

        const renderEquipManagement = (slotName, item, label) => {
            if (!item) return `<div class="p-2 border border-dashed rounded text-[10px] text-gray-400">${label}: 装備なし</div>`;
            Utils.ensureItemImprintSlots(item);
            const used = Utils.getImprintUsedCapacity(item);
            const equipped = (item.imprintSlots.equippedImprintIds || []).map(id => State.player.inventory.imprints.find(im => im.id === id)).filter(Boolean);
            const candidates = State.player.inventory.imprints.filter(im => !item.imprintSlots.equippedImprintIds.includes(im.id));
            return `<div class="p-2 border rounded bg-white text-[10px]">
                <div class="font-bold mb-1">${label} ソケット ${used}/${item.imprintSlots.capacity}</div>
                <div class="space-y-1 max-h-20 overflow-y-auto hide-scrollbar">${candidates.length > 0 ? candidates.map(im => `<button onclick="Game.equipImprint('${slotName}','${im.id}')" class="w-full text-left px-2 py-1 border rounded hover:bg-gray-50">装着 R${im.rank} ${im.effectKey} (cost${im.cost})</button>`).join('') : '<div class="text-gray-400">装着候補なし</div>'}</div>
                <div class="mt-1">${equipped.length > 0 ? equipped.map(im => `<button onclick="Game.removeImprint('${slotName}','${im.id}')" class="mr-1 mt-1 px-1 py-0.5 bg-red-50 text-red-700 border border-red-200 rounded">解除 R${im.rank}:${im.effectKey}</button>`).join('') : '<span class="text-gray-400">装着中なし</span>'}</div>
            </div>`;
        };

        let html = `<h3 class="font-bold text-lg mb-3 border-b pb-2"><i class="fa-solid fa-stamp mr-2"></i>刻印工房（鑑定無料）</h3>
            <div class="space-y-2 mb-3">${renderStack('rough')}${renderStack('refined')}${renderStack('gleaming')}</div>
            <div class="flex gap-1 mb-3">
                <button onclick="Game.addSealedImprints('rough',10)" class="px-2 py-1 border rounded text-[10px]">荒削り+10</button>
                <button onclick="Game.addSealedImprints('refined',10)" class="px-2 py-1 border rounded text-[10px]">精錬+10</button>
                <button onclick="Game.addSealedImprints('gleaming',10)" class="px-2 py-1 border rounded text-[10px]">煌めく+10</button>
            </div>
            <div class="border rounded p-2 mb-3 bg-gray-50">
                <div class="font-bold text-xs mb-1">合算結果（刻印のみ）</div>
                ${effectRows || '<div class="text-[11px] text-gray-400">有効な刻印効果なし</div>'}
                <div class="text-[11px] text-pink-700 mt-1">Rank6: 攻撃回数+1（同uniqueKeyは1回のみ適用）</div>
            </div>
            <div class="border rounded p-2 mb-3 bg-gray-50">
                <div class="font-bold text-xs mb-1"><i class="fa-solid fa-link mr-1"></i>刻印装着（工房内）</div>
                <div class="space-y-2">${renderEquipManagement('weapon', State.player.equip.weapon, '武器')}${renderEquipManagement('armor', State.player.equip.armor, '防具')}${renderEquipManagement('accessory', State.player.equip.accessory, '装飾品')}</div>
            </div>
            <div class="border rounded p-2 mb-2 bg-white">
                <div class="flex items-center justify-between mb-2">
                    <div class="font-bold text-xs"><i class="fa-solid fa-warehouse mr-1"></i>刻印倉庫（ランク順）</div>
                    <div class="text-[10px] text-gray-500">所持 ${State.player.inventory.imprints.length} 個</div>
                </div>
                <div class="flex flex-wrap gap-1 mb-2">${rankFilterButtons}</div>
                <div class="max-h-56 overflow-y-auto space-y-2 hide-scrollbar">`;

        if (groupedList.length === 0) {
            html += `<div class="text-center text-gray-400 text-xs py-4">条件に合う刻印がありません</div>`;
        } else {
            groupedList.forEach(im => {
                const cls = Utils.getImprintRankColor(im.rank);
                const bonusText = im.rank === 6 ? '-' : im.rankBonus.toFixed(1);
                const unitPrice = Math.max(1, im.rank * 4 + im.cost * 3);
                html += `<div class="p-2 border rounded text-xs ${cls}">
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <div class="font-bold">${IMPRINT_CATEGORY[im.category].name} Rank${im.rank} / cost${im.cost} ×${im.count}</div>
                            <div>effect:${im.effectKey} / bonus:${bonusText}</div>
                            <div class="text-[10px] text-gray-600">売却可能 ${im.freeCount} 個（装着中 ${im.count - im.freeCount} 個）</div>
                        </div>
                        <button onclick="Game.sellImprintsBySignature('${im.signature}')" class="px-2 py-1 bg-yellow-100 text-yellow-800 border border-yellow-300 rounded text-[10px] font-bold" ${im.freeCount < 1 ? 'disabled' : ''}>
                            売却 ${unitPrice * im.freeCount}G
                        </button>
                    </div>
                </div>`;
            });
        }

        html += `</div></div><button onclick="Game.closeModal()" class="mt-3 px-3 py-2 bg-gray-800 text-white rounded text-sm w-full">閉じる</button>`;
        Game.showModal(html);
    },

    showInventory: () => {

        Utils.ensureInventoryStructure();
        const p = State.player;
        const gearBag = p.inventory.equipment;
        
        const renderEquipSlot = (slotName, item, typeLabel) => {
            if (!item) return `<div class="p-2 border border-dashed rounded text-gray-400 text-xs text-center">${typeLabel} なし</div>`;
            Utils.ensureItemImprintSlots(item);
            const rData = RARITY[item.rarity];
            const statName = item.type === 'weapon' ? 'ATK' : (item.type === 'armor' ? 'DEF' : 'BONUS');
            const itemValStr = item.type === 'weapon' ? `${item.minAtk}-${item.maxAtk}` : item.value;
            const used = Utils.getImprintUsedCapacity(item);
            const imprints = (item.imprintSlots?.equippedImprintIds || []).map(id => p.inventory.imprints.find(im => im.id === id)).filter(Boolean);
            return `
                <div class="p-2 border rounded ${rData.bg} ${rData.border} text-xs relative pr-8">
                    <div class="font-bold ${rData.color} mb-1">${item.name} ${Utils.getWeaponDetailsHtml(item)}</div>
                    <div class="text-[10px] text-gray-600">${statName}:${itemValStr} / ${item.bonusStat.toUpperCase()}+${item.bonusValue}</div>
                    <div class="text-[10px] text-gray-600 mt-1">ソケット: ${used}/${item.imprintSlots.capacity}</div>
                    <div class="text-[10px] text-gray-500 mt-1">${imprints.length > 0 ? imprints.map(im => `R${im.rank}:${im.effectKey}`).join(' / ') : '刻印なし'}</div>
                    <button onclick="Game.unequip('${slotName}')" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-red-500"><i class="fa-solid fa-minus-circle"></i></button>
                </div>
            `;
        };

        const renderImprintAttach = (slotName) => {
            const item = p.equip[slotName];
            if (!item) return '';
            const attached = item.imprintSlots.equippedImprintIds;
            const options = p.inventory.imprints.filter(im => !attached.includes(im.id));
            return `<div class="border rounded p-2 text-[10px] bg-gray-50">
                <div class="font-bold mb-1">${slotName} 刻印装着</div>
                <div class="space-y-1 max-h-24 overflow-y-auto">${options.length > 0 ? options.map(im => `<button onclick="Game.equipImprint('${slotName}','${im.id}')" class="w-full text-left px-2 py-1 border rounded hover:bg-white">R${im.rank} ${im.effectKey} (cost${im.cost})</button>`).join('') : '<div class="text-gray-400">装着候補なし</div>'}</div>
                <div class="mt-1">${attached.map(id => p.inventory.imprints.find(im => im.id === id)).filter(Boolean).map(im => `<button onclick="Game.removeImprint('${slotName}','${im.id}')" class="mr-1 mt-1 px-1 py-0.5 bg-red-50 text-red-700 border border-red-200 rounded">解除 R${im.rank}:${im.effectKey}</button>`).join('')}</div>
            </div>`;
        };

        let html = `
            <h3 class="font-bold text-lg mb-3 border-b pb-2"><i class="fa-solid fa-toolbox mr-2"></i>装備と鞄</h3>
            <div class="mb-4 space-y-2">
                ${renderEquipSlot('weapon', p.equip.weapon, '武器')}
                ${renderEquipSlot('armor', p.equip.armor, '防具')}
                ${renderEquipSlot('accessory', p.equip.accessory, '装飾品')}
            </div>
            <button onclick="Game.showImprintLab()" class="w-full mb-3 px-3 py-2 border border-indigo-300 bg-indigo-50 text-indigo-700 rounded text-xs font-bold"><i class="fa-solid fa-stamp mr-1"></i>刻印工房を開く</button>
            <h4 class="font-bold text-sm mb-2 text-gray-600 border-b pb-1">鞄の中身</h4>
            <div class="space-y-2 max-h-48 overflow-y-auto hide-scrollbar">
        `;

        if (gearBag.length === 0) {
            html += `<div class="text-center text-gray-400 text-sm py-4">空っぽ</div>`;
        } else {
            gearBag.forEach((item, idx) => {
                Utils.ensureItemImprintSlots(item);
                const rData = RARITY[item.rarity];
                const statName = item.type === 'weapon' ? 'ATK' : (item.type === 'armor' ? 'DEF' : 'BONUS');
                const itemValStr = item.type === 'weapon' ? `${item.minAtk}-${item.maxAtk}` : item.value;
                const used = Utils.getImprintUsedCapacity(item);
                
                let diffHtml = '';
                if (item.type !== 'item') {
                    const curr = p.equip[item.type];
                    diffHtml = Utils.getCompareHtml(item, curr, statName);
                }
                const sellPrice = Math.max(1, Math.floor(item.price / 2));

                html += `
                    <div class="p-2 border rounded ${rData.bg} ${rData.border} text-xs flex justify-between items-center">
                        <div class="flex-1 pr-2">
                            <div class="font-bold ${rData.color} mb-1">${item.name} ${Utils.getWeaponDetailsHtml(item)}</div>
                            <div class="text-[10px] text-gray-600">${statName}:${itemValStr} / ${item.bonusStat.toUpperCase()}+${item.bonusValue} ${diffHtml}</div>
                            ${item.type !== 'item' ? `<div class="text-[10px] text-gray-600 mt-1"><i class="fa-solid fa-plug-circle-bolt mr-1"></i>ソケット: ${used}/${item.imprintSlots.capacity}</div>` : ''}
                        </div>
                        <div class="shrink-0 flex items-center space-x-1">
                            <button onclick="Game.equipItem(${idx})" class="px-2 py-1 bg-blue-500 text-white rounded text-[10px] font-bold">装備</button>
                            <button onclick="Game.sellItem(${idx})" class="px-2 py-1 bg-yellow-100 text-yellow-700 border border-yellow-300 rounded text-[10px] font-bold">売却(${sellPrice}G)</button>
                        </div>
                    </div>
                `;
            });
        }
        html += `</div>`;
        Game.showModal(html);
    },

    equipItem: (invIdx) => {
        Utils.ensureInventoryStructure();
        const item = State.player.inventory.equipment[invIdx];
        const slot = item.type;
        if (State.player.equip[slot]) {
            State.player.inventory.equipment.push(State.player.equip[slot]);
        }
        State.player.equip[slot] = item;
        State.player.inventory.equipment.splice(invIdx, 1);
        
        Game.showInventory();
        if(document.getElementById('player-info-block')) Game.renderPlayerInfo();
    },

    unequip: (slot) => {
        Utils.ensureInventoryStructure();
        if (State.player.equip[slot]) {
            State.player.inventory.equipment.push(State.player.equip[slot]);
            State.player.equip[slot] = null;
            Game.showInventory();
            if(document.getElementById('player-info-block')) Game.renderPlayerInfo();
        }
    },

    sellItem: (invIdx) => {
        Utils.ensureInventoryStructure();
        const item = State.player.inventory.equipment[invIdx];
        const sellPrice = Math.max(1, Math.floor(item.price / 2));
        State.player.gold += sellPrice;
        State.player.inventory.equipment.splice(invIdx, 1);
        Game.showInventory();
        Game.updateHeader();
    }
};

// ==========================================
// 起動
// ==========================================
window.onload = Game.init;

</script>
</body>
</html>
