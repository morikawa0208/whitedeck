<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Spire RPG</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f3f4f6; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100vh; background-color: #ffffff; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .anim-shake { animation: shake 0.3s ease-in-out; }
        
        @keyframes flashRed {
            0% { background-color: #ffffff; }
            50% { background-color: #fee2e2; }
            100% { background-color: #ffffff; }
        }
        .anim-damage { animation: flashRed 0.3s ease-in-out; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .dmg-text { position: absolute; color: red; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: floatUp 1s forwards; z-index: 50; }
        .heal-text { position: absolute; color: green; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: floatUp 1s forwards; z-index: 50; }
        .block-text { position: absolute; color: blue; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: floatUp 1s forwards; z-index: 50; }
    </style>
</head>
<body class="text-gray-800">

<div id="app" class="app-container">
    <!-- ヘッダー -->
    <header class="h-12 bg-white border-b flex justify-between items-center px-4 shrink-0 shadow-sm z-10">
        <div class="font-bold text-lg"><i class="fa-solid fa-chess-rook mr-1"></i> White Spire</div>
        <div id="header-floor" class="text-sm font-bold text-gray-500 hidden"><span id="floor-num">拠点</span></div>
        <div id="header-gold" class="text-sm font-bold text-yellow-500 hidden"><i class="fa-solid fa-coins"></i> <span id="gold-amount">0</span> G</div>
    </header>

    <!-- メインビュー領域 -->
    <main id="main-view" class="flex-1 overflow-hidden relative flex flex-col bg-white"></main>

    <!-- 下部メニュー -->
    <footer id="bottom-menu" class="h-16 bg-white border-t flex justify-around items-center shrink-0 hidden z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="Game.showMap()" class="flex flex-col items-center text-gray-500 hover:text-blue-600 w-1/5">
            <i class="fa-solid fa-map mb-1 text-lg"></i><span class="text-[10px]">マップ</span>
        </button>
        <button onclick="Game.showSkillMenu()" class="flex flex-col items-center text-gray-500 hover:text-blue-600 border-l border-r border-gray-100 w-1/5">
            <div class="relative inline-block">
                <i class="fa-solid fa-star mb-1 text-lg"></i>
                <span id="badge-skill" class="absolute -top-1.5 -right-2.5 bg-red-500 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full shadow border border-white hidden"></span>
            </div>
            <span class="text-[10px]">スキル</span>
        </button>
        <button onclick="Game.showStatus()" class="flex flex-col items-center text-gray-500 hover:text-blue-600 border-r border-gray-100 w-1/5">
            <div class="relative inline-block">
                <i class="fa-solid fa-user mb-1 text-lg"></i>
                <span id="badge-status" class="absolute -top-1.5 -right-2.5 bg-red-500 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full shadow border border-white hidden"></span>
            </div>
            <span class="text-[10px]">ステータス</span>
        </button>
        <button onclick="Game.showInventory()" class="flex flex-col items-center text-gray-500 hover:text-blue-600 border-r border-gray-100 w-1/5 relative">
            <i class="fa-solid fa-toolbox mb-1 text-lg"></i><span class="text-[10px]">装備/鞄</span>
        </button>
        <button onclick="Game.showLogs()" class="flex flex-col items-center text-gray-500 hover:text-blue-600 w-1/5">
            <i class="fa-solid fa-file-lines mb-1 text-lg"></i><span class="text-[10px]">ログ</span>
        </button>
    </footer>

    <!-- モーダル・オーバーレイ -->
    <div id="overlay" class="absolute inset-0 bg-black/50 z-50 hidden flex justify-center items-center p-4" onclick="if(event.target === this) Game.closeModal()">
        <div id="modal-content" class="bg-white w-full max-h-[80%] rounded-lg shadow-xl overflow-y-auto p-4 relative">
            <!-- Modal Content Injected Here -->
        </div>
    </div>
</div>

    combat: {
        enemies: [],
        turn: 1,
        isPlayerTurn: true,
        currentTargetIdx: 0,
        attacksLeft: 0,
        cooldowns: {},
        playerStatuses: [],
        buffs: {},
        defendUsed: false
    },
    merchantOptions: [],
    baseMerchantOptions: [],
    baseMerchantRefreshAvailable: true
};

// ==========================================
// 3. ユーティリティ・計算ロジック
// ==========================================
const Utils = {
    rand: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    weightedPick: (entries) => {
        const total = entries.reduce((sum, e) => sum + e.weight, 0);
        let roll = Math.random() * total;
        for (const e of entries) {
            roll -= e.weight;
            if (roll <= 0) return e.value;
        }
        return entries[entries.length - 1].value;
    },
    generateId: (prefix) => `${prefix}_${Date.now()}_${Math.floor(Math.random() * 100000)}`,
    ensureInventoryStructure: () => {
        if (!State.player.inventory || Array.isArray(State.player.inventory)) {
            State.player.inventory = { equipment: [], consumables: [], materials: [], imprints: [], sealedImprints: { rough: 0, refined: 0, gleaming: 0 } };
        }
        State.player.inventory.equipment ||= [];
        State.player.inventory.consumables ||= [];
        State.player.inventory.materials ||= [];
        State.player.inventory.imprints ||= [];
        State.player.inventory.sealedImprints ||= { rough: 0, refined: 0, gleaming: 0 };
    },
    ensureItemImprintSlots: (item) => {
        if (!item || item.type === 'item') return;
        if (!item.imprintSlots) {
            item.imprintSlots = { capacity: ItemGen.rollSocketCapacity(), equippedImprintIds: [] };
        }
        item.imprintSlots.capacity = Math.max(1, Math.min(5, item.imprintSlots.capacity || 1));
        item.imprintSlots.equippedImprintIds ||= [];
    },
    getImprintCostByRank: (rank) => {
        if (rank <= 2) return 1;
        if (rank <= 4) return 2;
        if (rank === 5) return 3;
        return 5;
    },
    getImprintRankColor: (rank) => {
        if (rank <= 2) return 'text-gray-700 bg-gray-100 border-gray-300';
        if (rank <= 4) return 'text-blue-700 bg-blue-50 border-blue-300';
        if (rank === 5) return 'text-yellow-700 bg-yellow-50 border-yellow-300';
        return 'text-pink-700 bg-gradient-to-r from-purple-50 to-pink-50 border-pink-300';
    },
    getImprintUsedCapacity: (equipItem) => {
        if (!equipItem || !equipItem.imprintSlots) return 0;
        const imprints = State.player.inventory.imprints || [];
        return equipItem.imprintSlots.equippedImprintIds.reduce((sum, imprintId) => {
            const imprint = imprints.find(i => i.id === imprintId);
            return sum + (imprint ? imprint.cost : 0);
        }, 0);
    },
    getEquippedImprints: () => {
        Utils.ensureInventoryStructure();
        const ids = [];
        ['weapon', 'armor', 'accessory'].forEach(slot => {
            const item = State.player.equip[slot];
            if (!item || !item.imprintSlots) return;
            ids.push(...item.imprintSlots.equippedImprintIds);
        });
        return State.player.inventory.imprints.filter(im => ids.includes(im.id));
    },
    getImprintEffectsSummary: () => {
        const equipped = Utils.getEquippedImprints();
        const grouped = {};
        const rank6Applied = new Set();
        let extraAttackCount = 0;
        equipped.forEach(im => {
            if (im.rank === 6) {
                if (!rank6Applied.has(im.uniqueKey)) {
                    rank6Applied.add(im.uniqueKey);
                    if (im.effectKey === 'attackCountPlusOne') extraAttackCount += 1;
                }
                return;
            }
            grouped[im.effectKey] ||= { effectiveLv: 0, value: 0 };
            const weight = IMPRINT_COST_WEIGHT[im.cost] || 1;
            grouped[im.effectKey].effectiveLv += (im.rank + im.rankBonus) * weight;
        });
        Object.keys(grouped).forEach(key => {
            grouped[key].value = Math.floor(grouped[key].effectiveLv);
        });
        return { grouped, rank6AppliedCount: rank6Applied.size, extraAttackCount };
    },
    getImprintStatValue: (effectKey) => {
        const summary = Utils.getImprintEffectsSummary();
        return summary.grouped[effectKey]?.value || 0;
    },
    getPassiveBonus: (stat) => {
        let bonus = 0;
        const job = State.player.job;
        if (!job) return 0;
        job.skills.filter(s => s.type === 'passive').forEach(s => {
            const lv = State.player.skillLevels[s.id] || 0;
            if (lv === 0) return;
            if (s.id === 'w_p1' && stat === 'maxHp') bonus += lv * 10;
            if (s.id === 'w_p2' && stat === 'str') bonus += lv * 2;
            if (s.id === 't_p1' && stat === 'luk') bonus += lv * 2;
            if (s.id === 't_p2' && stat === 'dex') bonus += lv * 2;
            if (s.id === 'm_p1' && stat === 'maxCp') bonus += lv * 5;
            if (s.id === 'm_p2' && stat === 'int') bonus += lv * 2;
        });
        return bonus;
    },
    getMaxHp: () => State.player.maxHp + (State.player.level * 2) + (State.player.addedStats.vit * 2) + Utils.getPassiveBonus('maxHp') + Utils.getImprintStatValue('maxHp'),
    getMaxCp: () => State.player.maxCp + (State.player.level * 1) + (State.player.addedStats.int * 1) + Utils.getPassiveBonus('maxCp') + Utils.getImprintStatValue('maxCp'),
    
    getAtk: () => {
        const str = Utils.getTotalStat('str');
        const w = State.player.equip.weapon;
        const base = !w ? str : str + Math.floor((w.minAtk + w.maxAtk) / 2);
        const atkPercent = Utils.getImprintStatValue('atkPercent');
        return Math.floor(base * (1 + atkPercent / 100));
    },
    getAtkRange: () => {
        const str = Utils.getTotalStat('str');
        const w = State.player.equip.weapon;
        const atkPercent = Utils.getImprintStatValue('atkPercent');
        if (!w) {
            const val = Math.floor(str * (1 + atkPercent / 100));
            return { min: val, max: val };
        }
        return {
            min: Math.floor((str + w.minAtk) * (1 + atkPercent / 100)),
            max: Math.floor((str + w.maxAtk) * (1 + atkPercent / 100))
        };
    },
    getDef: () => {
        const base = Utils.getTotalStat('vit') + (State.player.equip.armor ? State.player.equip.armor.value : 0);
        const defPercent = Utils.getImprintStatValue('defPercent');
        return Math.floor(base * (1 + defPercent / 100));
    },
    getBonusStat: (stat) => {
        let bonus = 0;
        ['weapon', 'armor', 'accessory'].forEach(slot => {
            if (State.player.equip[slot] && State.player.equip[slot].bonusStat === stat) {
                bonus += State.player.equip[slot].bonusValue;
            }
        });
        return bonus;
    },
    hasStatus: (owner, statusId) => {
        if (!owner || !owner.statuses) return false;
        return owner.statuses.some(st => st.id === statusId && st.turns > 0);
    },
    getStatusStacks: (owner, statusId) => {
        if (!owner || !owner.statuses) return 0;
        return owner.statuses.filter(st => st.id === statusId && st.turns > 0).reduce((sum, st) => sum + (st.stacks || 1), 0);
    },
    applyStatus: (owner, statusId, turns, stacks = 1, stackable = false, fixedValue = 0) => {
        if (!owner.statuses) owner.statuses = [];
        const existing = owner.statuses.find(st => st.id === statusId);
        if (existing) {
            existing.turns = Math.max(existing.turns, turns);
            if (stackable) {
                existing.stacks = (existing.stacks || 1) + stacks;
                existing.fixedValue = (existing.fixedValue || 0) + fixedValue;
                existing.stackable = true;
            } else {
                existing.stacks = stacks;
                existing.fixedValue = fixedValue;
                existing.stackable = false;
            }
            return;
        }
        owner.statuses.push({ id: statusId, turns, stacks, fixedValue, stackable });
    },
    decrementStatuses: (owner) => {
        if (!owner || !owner.statuses) return;
        owner.statuses = owner.statuses
            .map(st => ({ ...st, turns: st.turns - 1 }))
            .filter(st => st.turns > 0);
    },
    buildStatusBadges: (owner) => {
        if (!owner || !owner.statuses) return '';
        return owner.statuses
            .filter(st => st.turns > 0 && STATUS_META[st.id])
            .map(st => {
                const meta = STATUS_META[st.id];
                const cls = meta.kind === 'buff'
                    ? 'bg-green-50 text-green-700 border-green-300'
                    : 'bg-red-50 text-red-700 border-red-300';
                const stackText = st.stackable && st.stacks > 1 ? `x${st.stacks}` : '';
                return `<span class="inline-flex items-center border rounded px-1 py-0.5 text-[9px] font-bold ${cls}"><i class="fa-solid ${meta.icon} mr-0.5"></i>${meta.short}${stackText}:${st.turns}</span>`;
            })
            .join(' ');
    },
    getPlayerAttackCount: () => {
        const base = State.player.equip.weapon ? State.player.equip.weapon.hits : 1;
        const owner = { statuses: State.combat.playerStatuses || [] };
        let val = base;
        if (Utils.hasStatus(owner, 'attackCountUp')) val += 1;
        if (Utils.hasStatus(owner, 'attackCountDown')) val -= 1;
        val += Utils.getImprintEffectsSummary().extraAttackCount;
        return Math.max(1, val);
    },
    getTotalStat: (stat) => {
        let base = State.player.stats[stat] + State.player.addedStats[stat] + Utils.getBonusStat(stat) + Utils.getPassiveBonus(stat) + Utils.getImprintStatValue(stat);
        if (State.inDungeon && State.combat && State.combat.buffs) {
            const b = State.combat.buffs;
            if (stat === 'str' && b.atkUp && b.atkUp.turns > 0) base = Math.floor(base * b.atkUp.mult);
            if (stat === 'vit' && b.defUp && b.defUp.turns > 0) base = Math.floor(base * b.defUp.mult);
            if (stat === 'dex' && b.dexUp && b.dexUp.turns > 0) base = Math.floor(base * b.dexUp.mult);
            if (stat === 'int' && b.intUp && b.intUp.turns > 0) base = Math.floor(base * b.intUp.mult);
        }
        if (State.inDungeon && State.combat && State.combat.playerStatuses) {
            const p = { statuses: State.combat.playerStatuses };
            if (stat === 'str') {
                if (Utils.hasStatus(p, 'atkUp')) base = Math.floor(base * 1.25);
                if (Utils.hasStatus(p, 'atkDown')) base = Math.floor(base * 0.75);
            }
            if (stat === 'vit') {
                if (Utils.hasStatus(p, 'defUp')) base = Math.floor(base * 1.25);
                if (Utils.hasStatus(p, 'defDown')) base = Math.floor(base * 0.75);
            }
        }
        return Math.max(1, base);
    },
    getCompareHtml: (newItem, currItem, statName) => {
        if (!currItem) return `<span class="text-green-500 font-bold text-[10px] ml-1">▲NEW</span>`;
        let html = '';
        
        let diffVal = newItem.value - currItem.value;
        if (diffVal > 0) html += `<span class="text-green-500 font-bold text-[10px] ml-1">▲${statName}${diffVal}</span>`;
        else if (diffVal < 0) html += `<span class="text-red-500 font-bold text-[10px] ml-1">▼${statName}${-diffVal}</span>`;
        else html += `<span class="text-gray-400 font-bold text-[10px] ml-1">ー0</span>`;

        if (newItem.bonusStat === currItem.bonusStat) {
            let bDiff = newItem.bonusValue - currItem.bonusValue;
            if (bDiff > 0) html += `<span class="text-green-500 font-bold text-[10px] ml-1">▲${newItem.bonusStat.toUpperCase()}${bDiff}</span>`;
            else if (bDiff < 0) html += `<span class="text-red-500 font-bold text-[10px] ml-1">▼${newItem.bonusStat.toUpperCase()}${-bDiff}</span>`;
            else html += `<span class="text-gray-400 font-bold text-[10px] ml-1">ー0</span>`;
        } else {
            html += `<span class="text-green-500 font-bold text-[10px] ml-1">▲${newItem.bonusStat.toUpperCase()}${newItem.bonusValue}</span>`;
            html += `<span class="text-red-500 font-bold text-[10px] ml-1">▼${currItem.bonusStat.toUpperCase()}${currItem.bonusValue}</span>`;
        }
        return html;
    },
    getWeaponDetailsHtml: (item) => {
        if (item.type !== 'weapon') return '';
        const typeName = item.weaponType === 'sword' ? '剣' : (item.weaponType === 'dagger' ? '短剣' : '杖');
        const targetName = item.target === 'all' ? '全体' : '単体';
        return `<span class="text-[9px] bg-gray-200 text-gray-700 px-1 rounded ml-1 font-normal align-middle">[${typeName}] ${item.hits}回/${targetName}</span>`;
    },
    log: (msg) => {
        State.logs.push(msg);
        State.fullLogs.push(msg);
        if (State.logs.length > 20) State.logs.shift();
        Game.renderLogs();
    },
    showTextAnim: (elementId, text, type) => {
        const el = document.getElementById(elementId);
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const animEl = document.createElement('div');
        animEl.innerText = text;
        animEl.className = type === 'damage' ? 'dmg-text' : (type === 'heal' ? 'heal-text' : 'block-text');
        animEl.style.left = (rect.left + rect.width / 2 - 10) + 'px';
        animEl.style.top = (rect.top + rect.height / 2) + 'px';
        document.body.appendChild(animEl);
        setTimeout(() => animEl.remove(), 1000);
    }
};

// ==========================================
// 4. アイテム生成ロジック
// ==========================================
const ItemGen = {
    rollSocketCapacity: () => Utils.weightedPick(IMPRINT_SOCKET_WEIGHTS),
    rollRarity: () => {
        const roll = Utils.rand(1, 100) + Math.floor(Utils.getTotalStat('luk') / 2);
        if (roll > 98) return 'legendary';
        if (roll > 90) return 'epic';
        if (roll > 75) return 'rare';
        if (roll > 45) return 'uncommon';
        return 'common';
    },
    generate: (type, depth, fixedRarity = null) => {
        const rarityKey = fixedRarity || ItemGen.rollRarity();
        const rData = RARITY[rarityKey];
        const types = ['weapon', 'armor', 'accessory'];
        const actualType = type === 'random' ? types[Utils.rand(0, 2)] : type;
        
        const stats = ['str', 'vit', 'dex', 'int', 'luk'];
        const bonusStat = stats[Utils.rand(0, 4)];
        const bonusValue = Math.floor(depth * rData.mult) + Utils.rand(1, 3);
        
        let itemObj = {
            id: 'item_' + Date.now() + Math.random(),
            type: actualType,
            rarity: rarityKey,
            bonusStat: bonusStat,
            bonusValue: bonusValue,
            price: Math.floor(10 * depth * rData.mult),
            imprintSlots: { capacity: ItemGen.rollSocketCapacity(), equippedImprintIds: [] }
        };

        if (actualType === 'weapon') {
            const wTypes = ['sword', 'dagger', 'staff'];
            const wType = wTypes[Utils.rand(0, 2)];
            let wNames, baseMin, baseMax;
            
            if (wType === 'sword') {
                wNames = ['ショートソード', '鉄の剣', '鋼の剣', 'ミスリルブレード', '破滅の剣'];
                baseMin = 5; baseMax = 8;
            } else if (wType === 'dagger') {
                wNames = ['ダガー', '盗賊の短剣', 'アサシンダガー', 'クリス', 'シャドウエッジ'];
                baseMin = 2; baseMax = 4;
            } else if (wType === 'staff') {
                wNames = ['木の杖', '魔術師の杖', '賢者の杖', 'ルーンスタッフ', 'カドゥケウス'];
                baseMin = 3; baseMax = 5;
            }
            
            itemObj.name = wNames[Math.min(4, Math.floor(depth/3) + (rData.mult > 1 ? 1 : 0))];
            itemObj.weaponType = wType;
            
            const minMult = 1 + (depth * 0.2);
            const maxMult = 1 + (depth * 0.3);
            itemObj.minAtk = Math.floor(baseMin * minMult * rData.valMult);
            itemObj.maxAtk = Math.floor(baseMax * maxMult * rData.valMult) + Utils.rand(0, 2);
            itemObj.value = Math.floor((itemObj.minAtk + itemObj.maxAtk) / 2);
            
            itemObj.hits = wType === 'sword' ? 2 : (wType === 'dagger' ? 3 : 1);
            itemObj.target = wType === 'staff' ? 'all' : 'single';
            
        } else if (actualType === 'armor') {
            const names = ['布の服', '革の鎧', 'チェインメイル', 'プレートアーマー', 'イージス'];
            itemObj.name = names[Math.min(4, Math.floor(depth/3) + (rData.mult > 1 ? 1 : 0))];
            itemObj.value = Math.floor((2 + depth) * rData.valMult);
        } else {
            const names = ['力の指輪', '守りのアミュレット', '疾風のブーツ', '魔力のピアス', '幸運のタリスマン'];
            itemObj.name = names[Utils.rand(0, 4)];
            itemObj.value = 0;
        }

        return itemObj;
    }
};

// ==========================================
// 5. 敵・戦闘ロジック
// ==========================================
const EnemyLogic = {
    generateEnemies: (nodeType) => {
        if (nodeType === 'boss') {
            const bossDef = BOSS_DEFINITIONS[State.stage];
            const fallback = ENEMY_TEMPLATES.find(e => e.type === 'boss') || { name: 'ドラゴン (BOSS)', hp: 150, str: 15, vit: 8, icon: 'fa-dragon' };
            const base = bossDef ? bossDef.base : { hp: fallback.hp, str: fallback.str, vit: fallback.vit };
            const depthMult = 1 + (State.floor * 0.3) + ((State.stage - 1) * 1.2);
            return [{
                id: 'enemy_0',
                bossId: bossDef ? bossDef.id : 'boss_fallback',
                name: bossDef ? bossDef.name : fallback.name,
                maxHp: Math.floor(base.hp * depthMult),
                hp: Math.floor(base.hp * depthMult),
                str: Math.floor(base.str * depthMult),
                vit: Math.floor(base.vit * depthMult),
                icon: bossDef ? bossDef.icon : fallback.icon,
                block: 0,
                intent: null,
                statuses: [],
                skills: bossDef ? bossDef.skills : [],
                pattern: bossDef ? (bossDef.pattern || []) : [],
                bossSkillState: {
                    cooldowns: {},
                    atkMult: 1,
                    atkMultTurns: 0,
                    onceFlags: {},
                    patternIndex: 0
                }
            }];
        }

        const count = nodeType === 'boss' ? 1 : (nodeType === 'elite' ? Utils.rand(1, 2) : Utils.rand(1, 3));
        const enemies = [];
        const pool = ENEMY_TEMPLATES.filter(e => e.type === nodeType || (nodeType === 'normal' && e.type === 'normal'));
        
        for (let i = 0; i < count; i++) {
            const tpl = pool[Utils.rand(0, pool.length - 1)];
            const depthMult = 1 + (State.floor * 0.3) + ((State.stage - 1) * 1.2);
            enemies.push({
                id: 'enemy_' + i,
                name: `${tpl.name}${count > 1 ? String.fromCharCode(65 + i) : ''}`,
                maxHp: Math.floor(tpl.hp * depthMult),
                hp: Math.floor(tpl.hp * depthMult),
                str: Math.floor(tpl.str * depthMult),
                vit: Math.floor(tpl.vit * depthMult),
                icon: tpl.icon,
                block: 0,
                intent: null,
                statuses: []
            });
        }
        return enemies;
    },
    getBossSkill: (enemy, skillId) => (enemy.skills || []).find(s => s.id === skillId),
    canUseBossSkill: (enemy, skillId) => {
        const st = enemy.bossSkillState || { cooldowns: {} };
        return !st.cooldowns[skillId] || st.cooldowns[skillId] <= 0;
    },
    setBossSkillCooldown: (enemy, skillId) => {
        const st = enemy.bossSkillState;
        const skill = EnemyLogic.getBossSkill(enemy, skillId);
        if (!st || !skill || !skill.cooldown) return;
        st.cooldowns[skillId] = skill.cooldown;
    },
    decrementBossState: (enemy) => {
        if (!enemy.bossSkillState) return;
        const st = enemy.bossSkillState;
        Object.keys(st.cooldowns || {}).forEach(id => {
            if (st.cooldowns[id] > 0) st.cooldowns[id]--;
        });
        if (st.atkMultTurns > 0) {
            st.atkMultTurns--;
            if (st.atkMultTurns <= 0) st.atkMult = 1;
        }
    },
    decideBossIntent: (enemy) => {
        const st = enemy.bossSkillState || (enemy.bossSkillState = { cooldowns: {}, atkMult: 1, atkMultTurns: 0, onceFlags: {}, patternIndex: 0 });
        const pattern = (enemy.pattern && enemy.pattern.length > 0) ? enemy.pattern : (enemy.skills || []).map(sk => sk.id);
        if (!pattern || pattern.length === 0) {
            const baseMult = st.atkMultTurns > 0 ? st.atkMult : 1;
            return { type: 'attack', value: Math.floor(enemy.str * baseMult), icon: 'fa-khanda', color: 'text-red-500', name: '通常攻撃', desc: '単体に物理ダメージを与える。' };
        }

        const patternPos = st.patternIndex % pattern.length;
        const skillId = pattern[patternPos];
        st.patternIndex++;
        const skill = EnemyLogic.getBossSkill(enemy, skillId);
        const baseMult = st.atkMultTurns > 0 ? st.atkMult : 1;

        if (skillId === 'basic_attack') {
            return { type: 'attack', value: Math.floor(enemy.str * baseMult), icon: 'fa-khanda', color: 'text-red-500', name: '通常攻撃', desc: '単体に物理ダメージを与える。' };
        }
        if (skillId === 'basic_defend') {
            return { type: 'defend', value: enemy.vit * 2, icon: 'fa-shield', color: 'text-blue-500', name: '防御', desc: `ブロックを${enemy.vit * 2}獲得する。` };
        }

        if (!skill) {
            return { type: 'attack', value: Math.floor(enemy.str * baseMult), icon: 'fa-khanda', color: 'text-red-500', name: '通常攻撃', desc: '単体に物理ダメージを与える。' };
        }

        if (skill.type === 'buffSelf') {
            return {
                type: 'buffSelf',
                skillId: skill.id,
                turns: skill.turns,
                atkMult: skill.atkMult,
                icon: skill.icon,
                color: 'text-amber-600',
                name: skill.name,
                desc: `攻撃力を${Math.round((skill.atkMult - 1) * 100)}%上昇（${skill.turns}ターン）`
            };
        }
        if (skill.type === 'statusAttack') {
            return {
                type: 'statusAttack',
                skillId: skill.id,
                value: Math.floor(enemy.str * skill.damageMult * baseMult),
                turns: skill.turns,
                chance: skill.chance,
                statusId: skill.statusId,
                poisonDamage: skill.poisonDamage || 0,
                icon: skill.icon,
                color: 'text-lime-700',
                name: skill.name,
                desc: `ATKx${skill.damageMult.toFixed(2)}ダメージ＋${skill.statusId}を${skill.chance}%で${skill.turns}ターン付与`
            };
        }
        if (skill.type === 'powerAttack') {
            return {
                type: 'powerAttack',
                skillId: skill.id,
                value: Math.floor(enemy.str * skill.damageMult * baseMult),
                icon: skill.icon,
                color: 'text-red-700',
                name: skill.name,
                desc: `ATKx${skill.damageMult.toFixed(2)}の強力な攻撃`
            };
        }
        if (skill.type === 'heal') {
            return {
                type: 'heal',
                skillId: skill.id,
                value: Math.max(1, Math.floor(enemy.maxHp * skill.healRate)),
                icon: skill.icon,
                color: 'text-green-600',
                name: skill.name,
                desc: `最大HPの${Math.round(skill.healRate * 100)}%を回復`
            };
        }

        return { type: 'attack', value: Math.floor(enemy.str * baseMult), icon: 'fa-khanda', color: 'text-red-500', name: '通常攻撃', desc: '単体に物理ダメージを与える。' };
    },
    decideIntent: (enemy) => {
        if (enemy.bossId && enemy.bossId.startsWith('boss_stage_') && enemy.skills && enemy.skills.length > 0) {
            enemy.intent = EnemyLogic.decideBossIntent(enemy);
            return;
        }

        const rand = Utils.rand(1, 100);
        let intent = {};
        if (rand > 80) {
            intent = { type: 'defend', value: enemy.vit * 2, icon: 'fa-shield', color: 'text-blue-500' };
        } else if (rand > 65) {
            intent = { type: 'attack', value: Math.floor(enemy.str * 1.5), icon: 'fa-burst', color: 'text-red-600' };
        } else {
            intent = { type: 'attack', value: enemy.str, icon: 'fa-khanda', color: 'text-red-500' };
        }
        enemy.intent = intent;
    },
    applyDamageToPlayer: (enemyName, rawDmg) => {
        let actualDmg = rawDmg;

        // 回避判定 (盗賊 見切り)
        if (State.combat.buffs.evasion > 0) {
            const evadeChance = 50 + Math.floor(Utils.getTotalStat('dex') / 2);
            if (Utils.rand(1, 100) <= evadeChance) {
                Utils.log(`${enemyName}の攻撃! しかし素早く回避した!`);
                Utils.showTextAnim('player-hp-bar', 'MISS', 'block');
                return;
            }
        }

        // ブロック判定
        if (State.player.block > 0) {
            if (State.player.block >= rawDmg) {
                State.player.block -= rawDmg;
                actualDmg = 0;
                Utils.log(`${enemyName}の攻撃! ブロックで防いだ!`);
            } else {
                actualDmg = rawDmg - State.player.block;
                State.player.block = 0;
                Utils.log(`${enemyName}の攻撃! ブロックを貫通し ${actualDmg} のダメージ!`);
            }
        } else {
            Utils.log(`${enemyName}の攻撃! ${actualDmg} のダメージ!`);
        }

        // マジックシールド判定 (魔術師)
        if (actualDmg > 0 && State.combat.buffs.magicShield > 0) {
            if (State.player.cp >= actualDmg) {
                State.player.cp -= actualDmg;
                Utils.log(`マジックシールドが ${actualDmg} ダメージをCPで吸収!`);
                Utils.showTextAnim('player-hp-bar', `CP-${actualDmg}`, 'block');
                actualDmg = 0;
            } else {
                actualDmg -= State.player.cp;
                Utils.log(`マジックシールドが壊れた! CP枯渇!`);
                State.player.cp = 0;
                State.combat.buffs.magicShield = 0;
            }
        }

        if (actualDmg > 0) {
            State.player.hp -= actualDmg;
            Utils.showTextAnim('player-hp-bar', `-${actualDmg}`, 'damage');
            const el = document.getElementById('player-info-block');
            if(el) { el.classList.add('anim-damage'); setTimeout(() => el.classList.remove('anim-damage'), 300); }

        } else if (rawDmg > 0 && actualDmg === 0) {
            Utils.showTextAnim('player-hp-bar', 'BLOCKED', 'block');
        }
    },
    executeEnemyTurn: () => {
        Utils.log('--- 敵のターン ---');

        // 敵のターン開始時に、前ターンからのブロックをリセット
        State.combat.enemies.forEach(e => e.block = 0);

        let i = 0;
        const processNextEnemy = () => {
            if (i >= State.combat.enemies.length) {
                // プレイヤーターン開始
                State.combat.isPlayerTurn = true;
                State.combat.turn++;
                State.player.block = 0;
                State.combat.defendUsed = false;
                State.combat.attacksLeft = Utils.getPlayerAttackCount();
                
                // クールタイム減少
                for(let id in State.combat.cooldowns) {
                    if(State.combat.cooldowns[id] > 0) State.combat.cooldowns[id]--;
                }
                
                State.combat.enemies.forEach(e => {
                    EnemyLogic.decideIntent(e);
                });
                Game.renderCombat();
                Utils.log(`--- ターン ${State.combat.turn} ---`);
                return;
            }

            const enemy = State.combat.enemies[i];
            if (enemy.hp <= 0) { i++; processNextEnemy(); return; }

            setTimeout(() => {
                // 毒ダメージ処理
                const poisonTicks = (enemy.statuses || []).filter(st => st.id === 'poison' && st.turns > 0);
                if (poisonTicks.length > 0) {
                    const poisonDmg = poisonTicks.reduce((sum, st) => sum + (st.fixedValue || 0), 0);
                    enemy.hp -= poisonDmg;
                    Utils.showTextAnim(`en-${enemy.id}`, `-${poisonDmg}`, 'damage');
                    Utils.log(`${enemy.name}は毒で ${poisonDmg} のダメージ!`);
                    if (enemy.hp <= 0) {
                        Game.renderEnemies();
                        i++; processNextEnemy(); return;
                    }
                }
                if (Utils.hasStatus(enemy, 'freeze')) {
                    Utils.log(`${enemy.name}は凍結で行動できない!`);
                    Utils.showTextAnim(`en-${enemy.id}`, '凍結', 'block');
                    Utils.decrementStatuses(enemy);
                    Game.renderEnemies();
                    i++; processNextEnemy(); return;
                }

                const intent = enemy.intent;
                if (intent.type === 'attack') {
                    EnemyLogic.applyDamageToPlayer(enemy.name, intent.value);
                } else if (intent.type === 'defend') {
                    enemy.block += intent.value;
                    Utils.log(`${enemy.name}は防御の構えをとった! (ブロック+${intent.value})`);
                    Utils.showTextAnim(`en-${enemy.id}`, `+${intent.value}`, 'block');
                } else if (intent.type === 'buffSelf') {
                    enemy.bossSkillState.atkMult = intent.atkMult;
                    enemy.bossSkillState.atkMultTurns = intent.turns;
                    Utils.log(`${enemy.name}は${EnemyLogic.getBossSkill(enemy, intent.skillId)?.name || '強化'}を使った! (攻撃力上昇)`);
                    Utils.showTextAnim(`en-${enemy.id}`, 'ATK UP', 'block');
                } else if (intent.type === 'statusAttack') {
                    EnemyLogic.applyDamageToPlayer(enemy.name, intent.value);
                    if (Utils.rand(1, 100) <= intent.chance) {
                        const statusOwner = { statuses: State.combat.playerStatuses };
                        if (intent.statusId === 'poison') {
                            Utils.applyStatus(statusOwner, 'poison', intent.turns, 1, true, intent.poisonDamage || Math.max(1, Math.floor(intent.value * 0.2)));
                            Utils.log(`${enemy.name}の${EnemyLogic.getBossSkill(enemy, intent.skillId)?.name || '特殊攻撃'}! プレイヤーは毒に侵された!`);
                            Utils.showTextAnim('player-hp-bar', '毒', 'block');
                        } else {
                            Utils.applyStatus(statusOwner, intent.statusId, intent.turns);
                            Utils.log(`${enemy.name}の${EnemyLogic.getBossSkill(enemy, intent.skillId)?.name || '特殊攻撃'}! 状態異常が付与された!`);
                            Utils.showTextAnim('player-hp-bar', 'DEBUFF', 'block');
                        }
                    }
                } else if (intent.type === 'powerAttack') {
                    EnemyLogic.applyDamageToPlayer(enemy.name, intent.value);
                    Utils.log(`${enemy.name}の${EnemyLogic.getBossSkill(enemy, intent.skillId)?.name || '強攻撃'}!`);
                } else if (intent.type === 'heal') {
                    const before = enemy.hp;
                    enemy.hp = Math.min(enemy.maxHp, enemy.hp + intent.value);
                    const healed = enemy.hp - before;
                    Utils.log(`${enemy.name}は${EnemyLogic.getBossSkill(enemy, intent.skillId)?.name || '回復'}で ${healed} 回復した!`);
                    Utils.showTextAnim(`en-${enemy.id}`, `+${healed}`, 'heal');
                }

                Game.renderPlayerInfo();
                Game.renderLogs();

                if (State.player.hp <= 0) {
                    State.player.hp = 0;
                    Game.gameOver();
                    return;
                }

                Utils.decrementStatuses(enemy);
                EnemyLogic.decrementBossState(enemy);
                i++;
                processNextEnemy();
            }, 600);
        };
        processNextEnemy();
    },
    applyDamageToEnemy: (enemy, damage, isPierce = false) => {
        let actualDmg = damage;
        if (!isPierce && enemy.block > 0) {
            if (enemy.block >= actualDmg) {
                enemy.block -= actualDmg;
                actualDmg = 0;
            } else {
                actualDmg -= enemy.block;
                enemy.block = 0;
            }
        }
        
        if (actualDmg > 0) {
            enemy.hp -= actualDmg;
            Utils.showTextAnim(`en-${enemy.id}`, `-${actualDmg}`, 'damage');
            const el = document.getElementById(`en-${enemy.id}`);
            if(el){ el.classList.add('anim-shake'); setTimeout(()=>el.classList.remove('anim-shake'), 300); }
        } else {
            Utils.showTextAnim(`en-${enemy.id}`, `BLOCK`, 'block');
        }

        // 毒武器バフの処理
        if (actualDmg > 0 && State.combat.buffs.poisonWeapon && State.combat.buffs.poisonWeapon.turns > 0) {
            Utils.applyStatus(enemy, 'poison', 2, 1, true, State.combat.buffs.poisonWeapon.dmg);
            Utils.showTextAnim(`en-${enemy.id}`, 'POISON', 'block');
        }

        return actualDmg;
    },
    checkWin: () => {
        if (State.combat.enemies.every(e => e.hp <= 0)) {
            setTimeout(Game.showReward, 800);
            return true;
        }
        return false;
    }
};

        State.player.cp = Utils.getMaxCp();

            document.getElementById('floor-num').innerText = `${stageName} - B${State.floor}`;
        } else {

        const stp = State.player.statPoints;

            else { badgeStatus.classList.add('hidden'); }

    generateNodes: () => {
        State.nodes = [];
        if (State.floor === 5) {
            const bossDef = BOSS_DEFINITIONS[State.stage];
            State.nodes.push({
                type: 'boss',
                name: bossDef ? bossDef.name : 'ボス',
                icon: bossDef ? bossDef.icon : 'fa-skull',
                color: 'text-red-600 bg-red-50 border-red-200'
            });
            return;
        }
        
        const count = Utils.rand(2, 3);
        for (let i = 0; i < count; i++) {
            let type = 'normal';
            let name = '通常敵';
            let icon = 'fa-ghost';
            let color = 'text-gray-700 bg-white border-gray-300';

            const rand = Utils.rand(1, 100);
            if (State.floor > 2 && rand < 30) {
                type = 'elite'; name = 'エリート'; icon = 'fa-pastafarianism'; color = 'text-purple-600 bg-purple-50 border-purple-300';
            } else if (State.floor > 3 && rand < 45) {
                type = 'fountain'; name = '回復の泉'; icon = 'fa-faucet'; color = 'text-green-600 bg-green-50 border-green-300';
            } else if (State.floor > 3 && rand < 60) {
                type = 'merchant'; name = '商人'; icon = 'fa-shop'; color = 'text-yellow-600 bg-yellow-50 border-yellow-300';
            }

            State.nodes.push({ type, name, icon, color });
        }

            <div class="flex-1 flex flex-col p-4">

            <div class="flex-1 flex flex-col p-4 bg-gray-50">
                <div class="text-center mb-4 mt-2">
                    <i class="fa-solid fa-store text-4xl text-yellow-600 mb-2"></i>
                    <h2 class="text-xl font-bold">拠点商店</h2>

                    <button onclick="Game.refreshBaseMerchant()" class="mt-3 px-4 py-2 rounded text-sm font-bold ${State.baseMerchantRefreshAvailable ? 'bg-yellow-500 text-white hover:bg-yellow-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}" ${State.baseMerchantRefreshAvailable ? '' : 'disabled'}><i class="fa-solid fa-rotate-right mr-1"></i>商品を更新</button>
                </div>
                <div class="flex-1 overflow-y-auto space-y-2 mb-4 hide-scrollbar">

        State.baseMerchantOptions.forEach((item, idx) => {
            if (!item) return;

            let details = '';

            if (item.type !== 'item') {

                const rData = RARITY[item.rarity];

                const statName = item.type === 'weapon' ? 'ATK' : (item.type === 'armor' ? 'DEF' : 'BONUS');
                const itemValStr = item.type === 'weapon' ? `${item.minAtk}-${item.maxAtk}` : item.value;

                let currStr = 'なし';
                const curr = State.player.equip[item.type];
                const diffHtml = Utils.getCompareHtml(item, curr, statName);

                if (curr) {
                    const currValStr = curr.type === 'weapon' ? `${curr.minAtk}-${curr.maxAtk}` : curr.value;
                    currStr = `${curr.name} (${statName}:${currValStr} / ${curr.bonusStat.toUpperCase()}+${curr.bonusValue})`;
                }

                details = `
                    <div class="text-xs">[${rData.name}] ${statName}:${itemValStr} / ${item.bonusStat.toUpperCase()}+${item.bonusValue} ${diffHtml}</div>
                    <div class="text-[10px] mt-0.5"><i class="fa-solid fa-plug-circle-bolt mr-1"></i>ソケット:${item.imprintSlots.capacity}</div>
                    <div class="text-[9px] text-gray-500 mt-0.5">現在: ${currStr}</div>
                `;
            } else {
                details = `<div class="text-xs">${item.desc}</div>`;
            }

            const canBuy = State.player.gold >= item.price;
            html += `
                <div class="p-3 border rounded flex justify-between items-center ${style}">
                    <div class="flex-1 pr-2">
                        <div class="font-bold text-sm mb-1">${item.name} ${Utils.getWeaponDetailsHtml(item)}</div>
                        ${details}
                    </div>
                    <button onclick="Game.buyBaseItem(${idx})" class="px-3 py-1 rounded text-sm font-bold shrink-0 ${canBuy ? 'bg-yellow-500 text-white hover:bg-yellow-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}" ${!canBuy ? 'disabled' : ''}>
                        ${item.price} G
                    </button>
                </div>
            `;
        });

        html += `
                </div>
                <button onclick="Game.showImprintLab()" class="p-3 mb-2 border border-indigo-300 text-indigo-700 bg-indigo-50 rounded font-bold w-full shadow"><i class="fa-solid fa-stamp mr-1"></i>刻印工房</button>
                <button onclick="Game.renderStageSelect()" class="p-3 bg-gray-800 text-white rounded font-bold w-full shadow">ステージ選択へ戻る</button>
            </div>
        `;
        document.getElementById('main-view').innerHTML = html;
    },

    buyBaseItem: (idx) => {
        Utils.ensureInventoryStructure();
        const item = State.baseMerchantOptions[idx];
        if (item && State.player.gold >= item.price) {
            State.player.gold -= item.price;
            if (item.type === 'item') {
                State.player.hp = Math.min(Utils.getMaxHp(), State.player.hp + item.value);
            } else {
                State.player.inventory.equipment.push(item);
            }
            State.baseMerchantOptions[idx] = null;
            Game.updateHeader();
            Game.updateBaseMerchantUI();
        }
    },

    updateMerchantUI: () => {
        let html = `
            <div class="flex-1 flex flex-col p-4">
                <div class="text-center mb-4 mt-2">
                    <i class="fa-solid fa-shop text-4xl text-yellow-600 mb-2"></i>
                    <h2 class="text-xl font-bold">行商人</h2>
                    <p class="text-sm text-gray-500">所持金: <span class="text-yellow-600 font-bold">${State.player.gold} G</span></p>
                </div>
                <div class="flex-1 overflow-y-auto space-y-2 mb-4 hide-scrollbar">
        `;

        State.merchantOptions.forEach((item, idx) => {

            let style = 'bg-gray-50 border-gray-300';
            if (item.type !== 'item') {

                const rData = RARITY[item.rarity];

                let diffHtml = Utils.getCompareHtml(item, curr, statName);

                if (curr) {
                    const currValStr = curr.type === 'weapon' ? `${curr.minAtk}-${curr.maxAtk}` : curr.value;
                    currStr = `${curr.name} (${statName}:${currValStr} / ${curr.bonusStat.toUpperCase()}+${curr.bonusValue})`;
                }

                details = `
                    <div class="text-xs">[${rData.name}] ${statName}:${itemValStr} / ${item.bonusStat.toUpperCase()}+${item.bonusValue} ${diffHtml}</div>
                    <div class="text-[10px] mt-0.5"><i class="fa-solid fa-plug-circle-bolt mr-1"></i>ソケット:${item.imprintSlots.capacity}</div>
                    <div class="text-[9px] text-gray-500 mt-0.5">現在: ${currStr}</div>
                `;
            } else {
                details = `<div class="text-xs">${item.desc}</div>`;
            }

            html += `
                <div class="p-3 border rounded flex justify-between items-center ${style}">

                        ${details}
                    </div>
                    <button onclick="Game.buyItem(${idx})" class="px-3 py-1 rounded text-sm font-bold shrink-0 ${canBuy ? 'bg-yellow-500 text-white hover:bg-yellow-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}" ${!canBuy ? 'disabled' : ''}>
                        ${item.price} G

                <button onclick="Game.nextFloor()" class="p-3 bg-gray-800 text-white rounded font-bold w-full shadow">店を出る</button>
            </div>
        `;
        document.getElementById('main-view').innerHTML = html;
    },

    buyItem: (idx) => {
        Utils.ensureInventoryStructure();
        const item = State.merchantOptions[idx];
        if (State.player.gold >= item.price) {
            State.player.gold -= item.price;
            if (item.type === 'item') {
                State.player.hp = Math.min(Utils.getMaxHp(), State.player.hp + item.value);
            } else {
                State.player.inventory.equipment.push(item);
            }
            State.merchantOptions[idx] = null;
            Game.updateHeader();
            Game.updateMerchantUI();
        }
    },

    // --- Combat ---
    initCombat: (type) => {
        State.combat.enemies = EnemyLogic.generateEnemies(type);
        State.combat.turn = 1;
        State.combat.isPlayerTurn = true;
        State.combat.currentTargetIdx = 0;
        State.combat.attacksLeft = Utils.getPlayerAttackCount();
        State.logs = ['戦闘開始！'];
        State.player.block = 0;
        
        State.combat.cooldowns = State.combat.cooldowns || {}; // フロアを跨いでもCTを維持
        State.combat.buffs = { atkUp: {turns:0}, defUp: {turns:0}, dexUp: {turns:0}, intUp: {turns:0}, magicShield: 0, evasion: 0, poisonWeapon: {turns:0} };
        State.combat.playerStatuses = [];
        State.combat.defendUsed = false;

        State.combat.enemies.forEach(e => EnemyLogic.decideIntent(e));

        document.getElementById('main-view').innerHTML = `
            <div id="combat-block" class="h-[35%] border-b flex justify-center items-center gap-4 p-4 bg-gray-50 relative"></div>
            <div id="log-block" class="h-[15%] overflow-y-auto bg-white p-2 text-xs border-b border-gray-100 flex flex-col justify-end space-y-1 hide-scrollbar"></div>
            <div id="player-info-block" class="h-[25%] border-b p-3 bg-white flex flex-col justify-center relative"></div>
            <div id="command-block" class="h-[25%] p-2 flex flex-col gap-1 bg-gray-50 overflow-y-auto hide-scrollbar"></div>
        `;

        Game.renderCombat();
    },

    getFirstAliveEnemyIdx: () => {
        return State.combat.enemies.findIndex(e => e.hp > 0);
    },

    changeTarget: (idx) => {
        if (State.combat.enemies[idx].hp > 0) {
            State.combat.currentTargetIdx = idx;
            Game.renderEnemies();
        }
    },

    renderCombat: () => {
        Game.renderEnemies();
        Game.renderLogs();
        Game.renderPlayerInfo();
        Game.renderCommands();
    },

    renderEnemies: () => {
        const container = document.getElementById('combat-block');
        if (!container) return;
        
        let html = '';
        State.combat.enemies.forEach((enemy, idx) => {
            if (enemy.hp <= 0) return;
            
            let intentHtml = '';
            if (enemy.intent) {
                const intentName = enemy.intent.name || (enemy.intent.type === 'attack' ? '通常攻撃' : '行動');
                const intentDesc = enemy.intent.desc || (enemy.intent.value > 0 ? `予測ダメージ: ${enemy.intent.value}` : '行動情報なし');
                const specialIntentTypes = ['buffSelf', 'statusAttack', 'powerAttack', 'heal'];
                const isSpecialIntent = specialIntentTypes.includes(enemy.intent.type);
                const intentLabel = (!isSpecialIntent && Number.isFinite(enemy.intent.value))
                    ? `${intentName} ${enemy.intent.value}`
                    : intentName;
                intentHtml = `
                    <div class="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-white px-2 py-1 border rounded shadow text-[10px] font-bold ${enemy.intent.color} whitespace-nowrap z-10 flex items-center gap-1">
                        <i class="fa-solid ${enemy.intent.icon}"></i><span>${intentLabel}</span>
                        <i class="fa-solid fa-circle-info text-gray-400 hover:text-blue-500" onclick="event.stopPropagation(); Game.showInfoModal('${intentLabel.replace(/'/g, '&#39;')}', '${intentDesc.replace(/'/g, '&#39;')}')"></i>
                    </div>
                `;
            }

            const hpPercent = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
            
            const isTarget = (idx === State.combat.currentTargetIdx);
            const cursor = 'cursor-pointer';
            const borderStyle = isTarget ? 'border-red-500 shadow-md ring-2 ring-red-300' : 'border-gray-200 shadow-sm hover:border-blue-300';
            const clickAction = `onclick="Game.changeTarget(${idx})"`;

            let blockHtml = '';
            if (enemy.block > 0) blockHtml += `<div class="absolute -right-2 top-0 bg-blue-100 border border-blue-400 text-blue-800 text-[10px] px-1 rounded font-bold"><i class="fa-solid fa-shield"></i> ${enemy.block}</div>`;
            const enemyBadgeHtml = Utils.buildStatusBadges(enemy);

            html += `
                <div id="en-${enemy.id}" ${clickAction} class="relative w-24 h-32 bg-white border rounded-lg flex flex-col items-center justify-between p-2 transition-all ${cursor} ${borderStyle}">
                    ${intentHtml}
                    ${blockHtml}
                    <div class="text-3xl mt-4 text-gray-700"><i class="fa-solid ${enemy.icon}"></i></div>
                    <div class="w-full text-center">
                        <div class="text-[10px] font-bold truncate leading-tight mb-1">${enemy.name}</div>
                        <div class="w-full bg-gray-200 h-1.5 rounded overflow-hidden">
                            <div class="bg-red-500 h-full transition-all duration-300" style="width: ${hpPercent}%"></div>
                        </div>
                        <div class="text-[9px] mt-0.5">${enemy.hp} / ${enemy.maxHp}</div>
                        <div class="text-[9px] mt-1 min-h-[16px] flex flex-wrap gap-1 justify-center">${enemyBadgeHtml}</div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    },

    renderLogs: () => {
        const container = document.getElementById('log-block');
        if (!container) return;
        container.innerHTML = State.logs.map(l => `<div class="text-gray-700">${l}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    },

    renderPlayerInfo: () => {
        const container = document.getElementById('player-info-block');
        if (!container) return;

        const p = State.player;
        const maxHp = Utils.getMaxHp();
        const maxCp = Utils.getMaxCp();
        const hpPercent = Math.max(0, (p.hp / maxHp) * 100);
        const cpPercent = Math.max(0, (p.cp / maxCp) * 100);
        const expPercent = Math.max(0, (p.exp / (p.level * 50)) * 100);
        const def = Utils.getDef();
        const atkRange = Utils.getAtkRange();
        
        let buffHtml = '';
        if (p.block > 0) buffHtml += `<span class="ml-1 text-blue-600 text-xs font-bold border border-blue-400 bg-blue-50 px-1 rounded"><i class="fa-solid fa-shield"></i> ${p.block}</span>`;
        const playerStatusOwner = { statuses: State.combat.playerStatuses || [] };
        const statusBadges = Utils.buildStatusBadges(playerStatusOwner);
        if (statusBadges) buffHtml += `<span class="ml-1 inline-flex flex-wrap gap-1 align-middle">${statusBadges}</span>`;

        container.innerHTML = `
            <div class="flex justify-between items-end mb-1">
                <div class="font-bold text-sm flex items-center"><i class="fa-solid ${p.job.icon} mr-1"></i> Lv.${p.level} ${p.job.name} ${buffHtml}</div>
                <div class="text-[10px] text-gray-500">ATK:${atkRange.min}-${atkRange.max} / DEF:${def}</div>
            </div>
            
            <div class="flex items-center text-xs mb-1">
                <div class="w-8 font-bold text-red-600">HP</div>
                <div class="flex-1 bg-gray-200 h-2.5 rounded mx-2 relative overflow-hidden" id="player-hp-bar">
                    <div class="bg-red-500 h-full transition-all duration-300" style="width: ${hpPercent}%"></div>
                </div>
                <div class="w-16 text-right">${p.hp}/${maxHp}</div>
            </div>
            
            <div class="flex items-center text-xs">
                <div class="w-8 font-bold text-gray-800">CP</div>
                <div class="flex-1 bg-gray-200 border border-gray-300 h-2.5 rounded mx-2 relative overflow-hidden" id="player-cp-bar">
                    <div class="bg-white h-full transition-all duration-300" style="width: ${cpPercent}%"></div>
                </div>
                <div class="w-16 text-right">${p.cp}/${maxCp}</div>
            </div>
            
            <div class="flex items-center text-xs mt-1">
                <div class="w-8 font-bold text-yellow-600">EXP</div>
                <div class="flex-1 bg-gray-200 h-2.5 rounded mx-2 relative overflow-hidden">
                    <div class="bg-yellow-400 h-full transition-all duration-300" style="width: ${expPercent}%"></div>
                </div>
                <div class="w-16 text-right">${p.exp}/${p.level * 50}</div>
            </div>
        `;
    },

    renderCommands: () => {
        const container = document.getElementById('command-block');
        if (!container) return;

        if (!State.combat.isPlayerTurn) {
            container.innerHTML = `
                <div class="flex-1 flex justify-center items-center text-gray-500 font-bold h-full border rounded bg-gray-100">
                    敵のターン...
                </div>
            `;
            return;
        }

        const maxAttacks = Utils.getPlayerAttackCount();
        const hasAttacked = State.combat.attacksLeft < maxAttacks;
        const isFrozen = Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'freeze');
        const isSealed = Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'seal');
        const canAttack = State.combat.attacksLeft > 0 && !State.combat.defendUsed && !isFrozen;
        const canDefend = !hasAttacked && !State.combat.defendUsed && !isFrozen;

        const jobName = State.player.job.name;
        let defendName = '防御';
        let defendDesc = 'そのターン中、防御力(DEF)に応じたブロック（シールド）を得る。';
        if (jobName === '魔術師') {
            defendName = 'ﾏｼﾞｯｸｼｰﾙﾄﾞ';
            defendDesc = '3ターンの間、受けるダメージをHPの代わりにCPで肩代わりする。';
        }
        if (jobName === '盗賊') {
            defendName = '見切り';
            defendDesc = '1ターンの間、敵からの攻撃を確率(50% + DEX/2)で完全回避する。';
        }

        const btnClass = "border shadow-sm rounded font-bold text-xs flex flex-col items-center justify-center p-1.5 transition-colors active:scale-95 relative";

        let html = `
            <div class="grid grid-cols-4 gap-1 shrink-0">
                <button onclick="Game.executePlayerAction('attack')" class="${btnClass} ${canAttack ? 'bg-red-50 text-red-700 border-red-200 hover:bg-red-100' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}" ${!canAttack ? 'disabled' : ''}>
                    <i class="fa-solid fa-khanda mb-1"></i> こうげき
                    ${canAttack ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full shadow border border-white">${State.combat.attacksLeft}</span>` : ''}
                </button>
                <button onclick="Game.executeDefend()" class="${btnClass} ${canDefend ? 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}" ${!canDefend ? 'disabled' : ''}>
                    <i class="fa-solid fa-circle-info absolute top-0.5 right-0.5 text-gray-400 hover:text-blue-500 text-[10px]" onclick="event.stopPropagation(); Game.showInfoModal('${defendName}', '${defendDesc}')"></i>
                    <i class="fa-solid fa-shield mb-1"></i> <span class="text-[10px] truncate w-full text-center">${defendName}</span>
                </button>
                <button onclick="Game.usePotion()" class="${btnClass} bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100">
                    <i class="fa-solid fa-flask mb-1"></i> 回復<span class="text-[9px] font-normal mt-0.5">(10CP)</span>
                </button>
                <button onclick="Game.endPlayerTurn()" class="${btnClass} bg-gray-800 text-white border-gray-900 hover:bg-gray-700">
                    <i class="fa-solid fa-forward-step mb-1"></i> ターン終了
                </button>
            </div>
        `;

        const skills = State.player.job.skills.filter(s => s.type !== 'passive' && State.player.skillLevels[s.id] > 0);
        if (skills.length > 0) {
            html += `<div class="grid grid-cols-2 gap-1 mt-1 shrink-0">`;
            skills.forEach(s => {
                const lv = State.player.skillLevels[s.id];
                const ct = State.combat.cooldowns[s.id] || 0;
                const canUse = State.player.cp >= s.cost && ct === 0 && !isSealed && !isFrozen;
                const skillBtnClass = canUse ? 'bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed';
                
                html += `
                    <button onclick="Game.castSkill('${s.id}')" class="relative border shadow-sm rounded p-1.5 flex justify-between items-center text-left ${skillBtnClass} active:scale-95 transition-colors" ${!canUse ? 'disabled' : ''}>
                        <i class="fa-solid fa-circle-info absolute top-1 right-1 text-gray-400 hover:text-blue-500 text-[10px] z-10" onclick="event.stopPropagation(); Game.showInfoModal('${s.name}', '${s.desc(lv)}')"></i>
                        <div class="leading-tight pr-4">
                            <div class="font-bold text-xs">${s.name} <span class="text-[9px] font-normal opacity-70">Lv${lv}</span></div>
                            <div class="text-[9px] opacity-80">消費:${s.cost} 獲得:${s.gain}</div>
                        </div>
                        <div class="text-xs font-bold pl-1 mt-1">
                            ${ct > 0 ? `<span class="text-red-500">CT:${ct}</span>` : `<i class="fa-solid fa-play opacity-50"></i>`}
                        </div>
                    </button>
                `;
            });
            html += `</div>`;
        }

        container.innerHTML = html;
    },

    castSkill: (skillId) => {
        let target = State.combat.enemies[State.combat.currentTargetIdx];
        if (!target || target.hp <= 0) {
            State.combat.currentTargetIdx = Game.getFirstAliveEnemyIdx();
            target = State.combat.enemies[State.combat.currentTargetIdx];
        }
        if (!target || target.hp <= 0) return;

        const s = State.player.job.skills.find(x => x.id === skillId);
        if (Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'seal')) { Utils.log('封印中はスキルを使用できない!'); return; }
        if (Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'freeze')) { Utils.log('凍結中は行動できない!'); return; }
        const lv = State.player.skillLevels[s.id];
        
        State.player.cp -= s.cost;
        State.player.cp = Math.min(Utils.getMaxCp(), State.player.cp + s.gain);
        State.combat.cooldowns[s.id] = s.ct;
        Game.renderCommands();

        let atk = Utils.getAtk();
        let int = Utils.getTotalStat('int');

        // 戦士スキル
        if (s.id === 'w_a1') {
            const dmg = Math.max(1, Math.floor(atk * (1.5 + lv * 0.5)));
            const actual = EnemyLogic.applyDamageToEnemy(target, dmg);
            Utils.log(`${s.name}！ ${target.name}に ${actual} ダメージ！`);
        } else if (s.id === 'w_a2') {
            Utils.log(`${s.name}！ 全体攻撃！`);
            State.combat.enemies.forEach(e => {
                if(e.hp > 0) EnemyLogic.applyDamageToEnemy(e, Math.max(1, Math.floor(atk * (0.8 + lv * 0.2))));
            });
        } else if (s.id === 'w_s1') {
            Utils.applyStatus({ statuses: State.combat.playerStatuses }, 'atkUp', 3);
            Utils.log(`${s.name}！ 3ターン攻撃力上昇！`);
        } else if (s.id === 'w_s2') {
            Utils.applyStatus({ statuses: State.combat.playerStatuses }, 'defUp', 3);
            Utils.log(`${s.name}！ 3ターン防御力上昇！`);
        }
        // 盗賊スキル
        else if (s.id === 't_a1') {
            const dmg = Math.max(1, Math.floor(atk * (0.5 + lv * 0.1)));
            const count = Utils.rand(2, 4);
            let total = 0;
            const hit = (i) => {
                if(i >= count || target.hp <= 0) { Utils.log(`${s.name}！ 計 ${total} ダメージ！`); return; }
                total += EnemyLogic.applyDamageToEnemy(target, dmg);
                setTimeout(() => hit(i+1), 200);
            };
            hit(0);
        } else if (s.id === 't_a2') {
            const dmg = Math.max(1, Math.floor(atk * (1.0 + lv * 0.3)));
            const actual = EnemyLogic.applyDamageToEnemy(target, dmg, true);
            Utils.log(`${s.name}！ 防御を無視して ${actual} ダメージ！`);
        } else if (s.id === 't_s1') {
            Utils.applyStatus({ statuses: State.combat.playerStatuses }, 'attackCountUp', 3);
            Utils.log(`${s.name}！ 3ターン攻撃回数上昇！`);
        } else if (s.id === 't_s2') {
            State.combat.buffs.poisonWeapon = { turns: 3, dmg: lv * 2 };
            Utils.log(`${s.name}！ 武器に毒を塗布した！`);
        }
        // 魔術師スキル
        else if (s.id === 'm_a1') {
            Utils.log(`${s.name}！ 全体魔法攻撃！`);
            State.combat.enemies.forEach(e => {
                if(e.hp > 0) EnemyLogic.applyDamageToEnemy(e, Math.max(1, Math.floor(int * (1.0 + lv * 0.3))), true);
            });
        } else if (s.id === 'm_a2') {
            const dmg = Math.max(1, Math.floor(int * (1.5 + lv * 0.5)));
            const actual = EnemyLogic.applyDamageToEnemy(target, dmg, true);
            if (actual > 0) {
                Utils.applyStatus(target, 'freeze', 1);
                Utils.log(`${s.name}！ ${target.name}に ${actual} 魔法ダメージ！ 凍結を付与！`);
            } else {
                Utils.log(`${s.name}！ ${target.name}に ${actual} 魔法ダメージ！`);
            }
        } else if (s.id === 'm_s1') {
            State.combat.buffs.intUp = { turns: 3, mult: 1 + (0.2 + lv*0.1) };
            Utils.log(`${s.name}！ 3ターンINT上昇！`);
        } else if (s.id === 'm_s2') {
            const dmg = Math.max(1, Math.floor(int * 0.5));
            const actual = EnemyLogic.applyDamageToEnemy(target, dmg, true);
            const heal = 5 + lv * 5;
            State.player.cp = Math.min(Utils.getMaxCp(), State.player.cp + heal);
            Utils.log(`${s.name}！ ${actual}ダメを与え CPが ${heal} 回復！`);
            Utils.showTextAnim('player-hp-bar', `+${heal}CP`, 'block');
        }

        if (State.combat.enemies[State.combat.currentTargetIdx] && State.combat.enemies[State.combat.currentTargetIdx].hp <= 0) {
            const nextIdx = Game.getFirstAliveEnemyIdx();
            if (nextIdx !== -1) State.combat.currentTargetIdx = nextIdx;
        }

        Game.renderEnemies();
        Game.renderPlayerInfo();
        EnemyLogic.checkWin();
    },

    usePotion: () => {
        if (!State.combat.isPlayerTurn) return;
        if (Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'freeze')) { Utils.log('凍結中は行動できない!'); return; }
        if(State.player.cp < 10) { Utils.log("CPが足りません"); return; }
        
        State.player.cp -= 10;
        Game.renderCommands();

        const heal = Math.floor(Utils.getTotalStat('int') * 2) + 10;
        State.player.hp = Math.min(Utils.getMaxHp(), State.player.hp + heal);
        Utils.log(`回復魔法！ HPが ${heal} 回復した。`);
        Utils.showTextAnim('player-hp-bar', `+${heal}`, 'heal');
        Game.renderPlayerInfo();
    },

    executeDefend: () => {
        const maxAttacks = Utils.getPlayerAttackCount();
        const hasAttacked = State.combat.attacksLeft < maxAttacks;
        if (!State.combat.isPlayerTurn || State.combat.defendUsed || hasAttacked) return;
        if (Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'freeze')) return;
        
        State.combat.defendUsed = true;
        Game.renderCommands();

        const jobName = State.player.job.name;
        if (jobName === '戦士') {
            const defVal = Utils.getDef();
            State.player.block += defVal;
            Utils.log(`防御態勢！ (ブロック +${defVal})`);
        } else if (jobName === '魔術師') {
            State.combat.buffs.magicShield = 3;
            Utils.log(`マジックシールド！ (3ターンの間、HPの代わりにCPが減る)`);
        } else if (jobName === '盗賊') {
            State.combat.buffs.evasion = 1;
            Utils.log(`見切り！ (1ターンの間、敵の攻撃を高確率で完全回避)`);
        }
        Game.renderPlayerInfo();
        
        setTimeout(() => {
            Game.endPlayerTurn();
        }, 600);
    },

    executePlayerAction: (actionType) => {
        if (!State.combat.isPlayerTurn) return;
        if (Utils.hasStatus({ statuses: State.combat.playerStatuses }, 'freeze')) { Utils.log('凍結中は行動できない!'); return; }

        let target = State.combat.enemies[State.combat.currentTargetIdx];
        if (!target || target.hp <= 0) {
            State.combat.currentTargetIdx = Game.getFirstAliveEnemyIdx();
            target = State.combat.enemies[State.combat.currentTargetIdx];
        }
        if (!target || target.hp <= 0) return;

        if (actionType === 'attack') {
            if (State.combat.attacksLeft <= 0 || State.combat.defendUsed) return;
            
            const w = State.player.equip.weapon;
            const isAll = w && w.target === 'all';
            const atkRange = Utils.getAtkRange();

            if (isAll) {
                Utils.log(`全体攻撃！`);
                State.combat.enemies.forEach(e => {
                    if(e.hp > 0) {
                        const dmg = Math.max(1, Utils.rand(atkRange.min, atkRange.max));
                        const actualDmg = EnemyLogic.applyDamageToEnemy(e, dmg);
                        Utils.log(`${e.name}に ${actualDmg} のダメージ！`);
                    }
                });
            } else {
                const dmg = Math.max(1, Utils.rand(atkRange.min, atkRange.max));
                const actualDmg = EnemyLogic.applyDamageToEnemy(target, dmg);
                Utils.log(`${target.name}に ${actualDmg} のダメージ！`);
            }

            // CP獲得処理（武器タイプ依存）
            let cpGain = 0;
            const weaponType = State.player.equip.weapon?.weaponType;
            if (weaponType === 'sword') cpGain = 4;
            else if (weaponType === 'dagger') cpGain = 2;
            else if (weaponType === 'staff') cpGain = 7;
            
            State.player.cp = Math.min(Utils.getMaxCp(), State.player.cp + cpGain);
            Utils.showTextAnim('player-info-block', `+${cpGain}CP`, 'heal');

            State.combat.attacksLeft--;
            Game.renderCommands();

            if (State.combat.enemies[State.combat.currentTargetIdx].hp <= 0) {
                const nextIdx = Game.getFirstAliveEnemyIdx();
                if (nextIdx !== -1) State.combat.currentTargetIdx = nextIdx;
            }

            Game.renderEnemies();
            Game.renderPlayerInfo();
            EnemyLogic.checkWin();
        }
    },

    endPlayerTurn: () => {
        if (!State.combat.isPlayerTurn) return;

        const playerStatusOwner = { statuses: State.combat.playerStatuses || [] };
        const poisonTicks = playerStatusOwner.statuses.filter(st => st.id === 'poison' && st.turns > 0);
        if (poisonTicks.length > 0) {
            const poisonDmg = poisonTicks.reduce((sum, st) => sum + (st.fixedValue || 0), 0);
            State.player.hp = Math.max(0, State.player.hp - poisonDmg);
            Utils.log(`プレイヤーは毒で ${poisonDmg} ダメージを受けた!`);
            Utils.showTextAnim('player-hp-bar', `-${poisonDmg}`, 'damage');
            if (State.player.hp <= 0) {
                Game.renderCombat();
                Game.gameOver();
                return;
            }
        }

        State.combat.isPlayerTurn = false;
        
        // バフターン減少 (プレイヤー行動終了時)
        for(let key in State.combat.buffs) {
            if(typeof State.combat.buffs[key] === 'object' && State.combat.buffs[key].turns > 0) {
                State.combat.buffs[key].turns--;
            } else if(typeof State.combat.buffs[key] === 'number' && State.combat.buffs[key] > 0) {
                State.combat.buffs[key]--;
            }
        }
        Utils.decrementStatuses(playerStatusOwner);
        State.combat.playerStatuses = playerStatusOwner.statuses;
        
        Game.renderCombat();
        EnemyLogic.executeEnemyTurn();
    },
